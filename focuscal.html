<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#080810"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="FocusCal"/>
  <title>FocusCal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;500;700;900&family=Rajdhani:wght@700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:#080810;height:100%;overflow-x:hidden;}
    ::-webkit-scrollbar{display:none;}
    body{font-family:'Barlow Condensed',sans-serif;color:#e2e8f0;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    textarea::placeholder{color:#555;}
    input[type="datetime-local"],input[type="number"],input[type="text"]{color-scheme:dark;}
  </style>
</head>
<body>
<div id="root"></div>

<script>
// ─── EVENTS ──────────────────────────────────────────────────────────────────
const DEFAULT_EVENTS = [
  {id:"e00",title:"Wake Up (Alarms 1:50 AM)",datetime:"2026-07-01T01:50",durationMins:10},
  {id:"e01",title:"Hydrate — Spring Water and Electrolytes",datetime:"2026-07-01T02:00",durationMins:5},
  {id:"e02",title:"Walk — Thunder Mountain",datetime:"2026-07-01T02:05",durationMins:20},
  {id:"e03",title:"Shower",datetime:"2026-07-01T02:25",durationMins:10},
  {id:"e04",title:"Meditate",datetime:"2026-07-01T02:35",durationMins:10},
  {id:"e05",title:"Clean and Tidy Up",datetime:"2026-07-01T02:45",durationMins:30},
  {id:"e06",title:"Reselling Study",datetime:"2026-07-01T03:15",durationMins:60},
  {id:"e07",title:"EQC Job Study",datetime:"2026-07-01T04:15",durationMins:60},
  {id:"e08",title:"Meal 1 — Red Meat, Eggs, Organic Fruit + Vitamin D",datetime:"2026-07-01T05:15",durationMins:60},
  {id:"e09",title:"Post Meal Walk",datetime:"2026-07-01T06:15",durationMins:15},
  {id:"e10",title:"Check Credit Score",datetime:"2026-07-01T06:30",durationMins:30},
  {id:"e11",title:"Call Collections Agency",datetime:"2026-07-01T07:00",durationMins:30},
  {id:"e12",title:"Call Elevate",datetime:"2026-07-01T07:30",durationMins:30},
  {id:"e13",title:"Call HR at Emerald Queen Casino",datetime:"2026-07-01T08:00",durationMins:10},
  {id:"e14",title:"Boxing Session 1",datetime:"2026-07-01T08:10",durationMins:15},
  {id:"e15",title:"Meditate",datetime:"2026-07-01T08:25",durationMins:15},
  {id:"e16",title:"Meal 2 — Red Meat, Eggs, Organic Fruit + Vitamin D",datetime:"2026-07-01T08:40",durationMins:60},
  {id:"e17",title:"Post Meal Walk",datetime:"2026-07-01T09:40",durationMins:15},
  {id:"e18",title:"Downtime — Sit on Porch, Reflect, Let Thoughts Pass",datetime:"2026-07-01T09:55",durationMins:245},
  {id:"e19",title:"Boxing Session 2",datetime:"2026-07-01T14:00",durationMins:15},
  {id:"e20",title:"Downtime — Sit on Porch, Reflect, Let Thoughts Pass",datetime:"2026-07-01T14:15",durationMins:75},
  {id:"e21",title:"Meal 3 — Red Meat, Eggs, Organic Fruit + Vitamin D",datetime:"2026-07-01T15:30",durationMins:60},
  {id:"e22",title:"Post Meal Walk",datetime:"2026-07-01T16:30",durationMins:15},
  {id:"e23",title:"Plan Tomorrow",datetime:"2026-07-01T16:45",durationMins:20},
  {id:"e24",title:"Shower",datetime:"2026-07-01T17:05",durationMins:15},
  {id:"e25",title:"Wind Down — Phone Screen Orange, No Blue Light",datetime:"2026-07-01T17:20",durationMins:30},
  {id:"e26",title:"Bed 🛌",datetime:"2026-07-01T17:50",durationMins:10},
];

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function pad(n){return String(n).padStart(2,"0");}
function fmt(d){let h=d.getHours(),m=pad(d.getMinutes()),ap=h>=12?"PM":"AM";h=h%12||12;return`${h}:${m} ${ap}`;}
function fmtDate(d){return d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});}
function evStart(ev){return new Date(ev.datetime);}
function evEnd(ev){return new Date(evStart(ev).getTime()+ev.durationMins*60000);}
function isActive(ev,now){return now>=evStart(ev)&&now<evEnd(ev);}
function isPast(ev,now){return now>=evEnd(ev);}
function timeLeft(ev,now){
  const diff=evEnd(ev)-now; if(diff<=0)return"done";
  const m=Math.ceil(diff/60000),h=Math.floor(m/60),rm=m%60;
  if(h>0&&rm>0)return`${h}h ${rm}m`; if(h>0)return`${h}h`; return`${m}m`;
}
function timeUntil(date,now){
  const diff=date-now; if(diff<=0)return null;
  const m=Math.ceil(diff/60000),h=Math.floor(m/60),rm=m%60;
  if(h>0&&rm>0)return`${h}h ${rm}m`; if(h>0)return`${h}h`; return`${m}m`;
}
function cardColor(ev,now){
  if(isActive(ev,now))return"#00ff87";
  const d=evStart(ev)-now;
  if(d<15*60000)return"#ff6b35"; if(d<60*60000)return"#ffd166"; return"#6b7280";
}

// ─── PARSER ──────────────────────────────────────────────────────────────────
function parseSchedule(text){
  const lines=text.split("\n").map(l=>l.trim()).filter(Boolean);
  const months={january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
  let baseDate=new Date(), explicitDate=false;
  for(const line of lines.slice(0,3)){
    const m=line.match(/([a-zA-Z]+)\s+(\d{1,2}),?\s*(\d{4})?/);
    if(m){const mon=months[m[1].toLowerCase()];if(mon!==undefined){const day=parseInt(m[2]),year=m[3]?parseInt(m[3]):new Date().getFullYear(),c=new Date(year,mon,day);if(!isNaN(c.getTime())){baseDate=c;explicitDate=true;break;}}}
  }
  function ds(d){return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
  const todayStr=ds(baseDate),tomStr=ds(new Date(baseDate.getTime()+86400000));
  function parseTime(s){s=s.trim();const m=s.match(/^(\d{1,2}):(\d{2})\s*([AaPp][Mm])?$/);if(!m)return null;let h=parseInt(m[1]),min=parseInt(m[2]);const ap=(m[3]||"").toUpperCase();if(ap==="AM"&&h===12)h=0;else if(ap==="PM"&&h!==12)h+=12;return{h,min};}
  const events=[];let id=1000;
  for(const line of lines){
    const clean=line.replace(/^[^\d]+/,"").trim();
    const times=[...clean.matchAll(/(\d{1,2}:\d{2}\s*(?:[AaPp][Mm])?)/g)].map(m=>m[1].trim());
    if(times.length<2)continue;
    const st=parseTime(times[0]),et=parseTime(times[1]);if(!st)continue;
    const secondIdx=clean.lastIndexOf(times[1])+times[1].length;
    let title=clean.slice(secondIdx).replace(/^[\s\-–—:|·•]+/,"").trim();
    if(!title||title.length<2)continue;
    const useDateStr=explicitDate?(st.h<4&&events.length>0?tomStr:todayStr):(st.h<8?tomStr:todayStr);
    const datetime=`${useDateStr}T${pad(st.h)}:${pad(st.min)}`;
    let dur=1;if(et){let sm=st.h*60+st.min,em=et.h*60+et.min;if(em<=sm)em+=24*60;dur=Math.max(1,em-sm);}
    events.push({id:String(id++),title,datetime,durationMins:dur});
  }
  return events;
}

// ─── STATE ───────────────────────────────────────────────────────────────────
let events=[...DEFAULT_EVENTS];
try{const s=localStorage.getItem("fc_events");if(s){const p=JSON.parse(s);if(Array.isArray(p)&&p.length>0)events=p;}}catch{}

function saveEvents(evs){events=evs;try{localStorage.setItem("fc_events",JSON.stringify(evs));}catch{}}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  const now=new Date();
  const sorted=[...events].sort((a,b)=>evStart(a)-evStart(b));
  const current=sorted.find(ev=>isActive(ev,now));
  const firstEv=sorted[0];
  const dayStarted=firstEv&&now>=evStart(firstEv);
  const upcoming=dayStarted?sorted.filter(ev=>evStart(ev)>now):sorted;
  const next4=upcoming.slice(0,4);
  const rest=upcoming.slice(4);
  const progress=current?Math.min(100,((now-evStart(current))/(current.durationMins*60000))*100):0;

  // Day progress
  let pct=0,done=0,remaining=0;
  if(sorted.length){
    const ds=evStart(sorted[0]),de=evEnd(sorted[sorted.length-1]);
    pct=Math.min(100,Math.max(0,((now-ds)/(de-ds))*100));
    done=sorted.filter(ev=>isPast(ev,now)).length;
    remaining=sorted.filter(ev=>evStart(ev)>now).length;
  }

  const showAll=document.getElementById("fc-show-all")?document.getElementById("fc-show-all").dataset.open==="1":false;
  const showPaste=document.getElementById("fc-paste-modal")?document.getElementById("fc-paste-modal").style.display!=="none":false;
  const showAdd=document.getElementById("fc-add-modal")?document.getElementById("fc-add-modal").style.display!=="none":false;

  // Grid background
  const grid=`background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:44px 44px;`;

  let html=`
  <div style="min-height:100vh;background:#080810;${grid}padding-bottom:60px;">

  <!-- HEADER -->
  <header style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;background:#080810;z-index:10;">
    <div style="font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#00ff87;letter-spacing:3px;">⬡ FOCUSCAL</div>
    <div style="text-align:center;">
      <div style="font-family:'Rajdhani',sans-serif;font-size:30px;font-weight:700;color:#fff;letter-spacing:2px;line-height:1;">${fmt(now)}</div>
      <div style="font-size:11px;color:#aaa;margin-top:1px;font-family:'Space Mono',monospace;">${fmtDate(now)}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button onclick="openPaste()" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#d1d5db;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;padding:7px 10px;cursor:pointer;">↺</button>
      <button onclick="openAdd()" style="background:transparent;border:1px solid #00ff87;color:#00ff87;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:7px 11px;cursor:pointer;">+ ADD</button>
    </div>
  </header>

  <!-- DAY PROGRESS -->
  <div style="padding:10px 22px 0;">
    <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
      <span style="font-family:'Space Mono',monospace;font-size:9px;color:#fff;letter-spacing:2px;">${Math.round(pct)}% COMPLETE</span>
      <span style="font-family:'Space Mono',monospace;font-size:9px;color:#fff;">${done} done · ${remaining} left</span>
    </div>
    <div style="height:2px;background:rgba(255,255,255,0.05);border-radius:1px;">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#00ff87,#00cc6a);border-radius:1px;transition:width 1s linear;box-shadow:0 0 6px rgba(0,255,135,0.3);"></div>
    </div>
  </div>

  <!-- HERO -->
  <section style="padding:18px 22px 10px;">
    ${current?`
    <div style="background:linear-gradient(135deg,rgba(0,255,135,0.07),rgba(0,255,135,0.015));border:1px solid rgba(0,255,135,0.28);padding:20px 22px;">
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:#00ff87;letter-spacing:3px;margin-bottom:8px;animation:pulse 2s ease infinite;">● HAPPENING NOW</div>
      <div style="font-size:36px;font-weight:900;color:#fff;line-height:1.05;margin-bottom:10px;letter-spacing:-0.3px;">${current.title}</div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:#fff;display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px;">
        <span>${fmt(evStart(current))} ~ ${fmt(evEnd(current))}</span>
        <span style="color:#555;">·</span>
        <span style="color:#00ff87;">${timeLeft(current,now)} left</span>
      </div>
      <div style="height:3px;background:rgba(255,255,255,0.07);margin-bottom:12px;">
        <div style="height:100%;background:#00ff87;box-shadow:0 0 8px rgba(0,255,135,0.4);transition:width 1s linear;width:${progress}%;"></div>
      </div>
      <button onclick="openEdit('${current.id}')" style="background:transparent;border:1px solid rgba(255,255,255,0.15);color:#e2e8f0;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:5px 10px;cursor:pointer;">EDIT</button>
    </div>`:`
    <div style="border:1px dashed rgba(255,255,255,0.08);padding:28px 20px;text-align:center;">
      <div style="font-size:24px;color:#555;margin-bottom:8px;">◈</div>
      <div style="font-size:22px;font-weight:700;color:#fff;">No active task</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:#aaa;margin-top:5px;">${next4.length>0?`Next up in ${timeUntil(evStart(next4[0]),now)}`:"Schedule is clear"}</div>
    </div>`}
  </section>

  <!-- NEXT 4 -->
  <section style="padding:12px 22px 8px;">
    <div style="font-family:'Space Mono',monospace;font-size:10px;color:#fff;letter-spacing:4px;margin-bottom:10px;">NEXT UP</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${next4.length===0?`<div style="grid-column:span 2;font-family:'Space Mono',monospace;font-size:11px;color:#aaa;padding:16px 0;text-align:center;">Nothing else scheduled</div>`:
      next4.map(ev=>{
        const color=cardColor(ev,now);
        const until=timeUntil(evStart(ev),now);
        return`<div onclick="openEdit('${ev.id}')" style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.06);padding:12px 12px 12px 14px;cursor:pointer;position:relative;overflow:hidden;">
          <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:${color};"></div>
          <div style="font-family:'Space Mono',monospace;font-size:10px;color:#fff;font-weight:700;margin-bottom:4px;">${fmt(evStart(ev))} ~ ${fmt(evEnd(ev))}</div>
          <div style="font-size:15px;font-weight:700;color:#e2e8f0;line-height:1.2;margin-bottom:5px;">${ev.title}</div>
          <div style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:${color};">${until?`in ${until}`:"NOW"}</div>
        </div>`;
      }).join("")}
    </div>
  </section>

  <!-- SEE ALL -->
  ${rest.length>0?`
  <div style="padding:6px 22px 0;">
    <button id="fc-show-all" data-open="${showAll?1:0}" onclick="toggleAll(this)" style="width:100%;background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.05);color:#fff;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;padding:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
      <span>${showAll?"▲ HIDE":"▼ SEE ALL"}</span>
      <span style="color:#aaa;">+${rest.length} more</span>
    </button>
  </div>
  ${showAll?`<section style="padding:8px 22px 80px;">${rest.map(ev=>{
    const color=cardColor(ev,now),past=isPast(ev,now),until=timeUntil(evStart(ev),now);
    return`<div onclick="openEdit('${ev.id}')" style="background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.04);padding:10px 12px;margin-bottom:5px;cursor:pointer;position:relative;opacity:${past?0.35:1};">
      <div style="position:absolute;left:0;top:0;bottom:0;width:2px;background:${color};"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding-left:8px;">
        <div>
          <div style="font-family:'Space Mono',monospace;font-size:9px;color:#e2e8f0;font-weight:700;margin-bottom:2px;text-decoration:${past?"line-through":"none"};">${fmt(evStart(ev))} ~ ${fmt(evEnd(ev))}</div>
          <div style="font-size:14px;font-weight:600;color:${past?"#444":"#aaa"};text-decoration:${past?"line-through":"none"};">${ev.title}</div>
        </div>
        <div style="font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:${color};flex-shrink:0;margin-left:10px;">${past?"✓":until?`in ${until}`:""}</div>
      </div>
    </div>`;
  }).join("")}</section>`:""}
  `:""}

  </div>`;

  document.getElementById("root").innerHTML=html;
}

// ─── MODALS ──────────────────────────────────────────────────────────────────
function openPaste(){
  const modal=document.createElement("div");
  modal.id="fc-paste-modal";
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:flex-end;justify-content:center;z-index:200;backdrop-filter:blur(4px);";
  modal.innerHTML=`
    <div onclick="event.stopPropagation()" style="background:#0f0f18;border:1px solid rgba(255,255,255,0.1);border-bottom:none;padding:24px 22px 40px;width:100%;max-width:500px;border-radius:16px 16px 0 0;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div style="font-family:'Space Mono',monospace;font-size:12px;color:#00ff87;letter-spacing:3px;">↺ NEW DAY</div>
        <button onclick="closePaste()" style="background:transparent;border:none;color:#fff;font-size:22px;cursor:pointer;">×</button>
      </div>
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:#888;line-height:1.8;margin-bottom:12px;">Paste your schedule — any format. Include the date at the top.</div>
      <textarea id="paste-input" onInput="previewPaste(this.value)" placeholder="WEDNESDAY, JULY 1&#10;&#10;2:00 AM – 2:30 AM — Wake Up&#10;2:30 AM – 3:00 AM — Hydrate&#10;..." style="width:100%;height:160px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.15);color:#e2e8f0;font-family:'Space Mono',monospace;font-size:12px;padding:12px;resize:none;outline:none;line-height:1.7;caret-color:#00ff87;border-radius:4px;"></textarea>
      <div id="paste-preview" style="margin-top:10px;"></div>
      <button id="paste-load-btn" onclick="loadPaste()" disabled style="width:100%;margin-top:14px;background:#1a1a2e;border:none;color:#333;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:15px;cursor:default;transition:all 0.2s;">LOAD SCHEDULE</button>
    </div>`;
  modal.onclick=closePaste;
  document.body.appendChild(modal);
}

function previewPaste(text){
  const parsed=parseSchedule(text);
  const preview=document.getElementById("paste-preview");
  const btn=document.getElementById("paste-load-btn");
  if(parsed.length>0){
    btn.disabled=false;
    btn.style.cssText="width:100%;margin-top:14px;background:#00ff87;border:none;color:#080810;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:15px;cursor:pointer;";
    btn.textContent=`LOAD ${parsed.length} EVENTS →`;
    preview.innerHTML=`<div style="border:1px solid rgba(0,255,135,0.2);padding:12px;background:rgba(0,255,135,0.04);">
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:#00ff87;letter-spacing:2px;margin-bottom:8px;">✓ ${parsed.length} EVENTS DETECTED</div>
      ${parsed.slice(0,4).map(ev=>`<div style="font-family:'Space Mono',monospace;font-size:10px;margin-bottom:4px;display:flex;gap:8px;"><span style="color:#00ff87;flex-shrink:0">${fmt(evStart(ev))}</span><span style="color:#444;">→</span><span style="color:#aaa;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${ev.title}</span></div>`).join("")}
      ${parsed.length>4?`<div style="font-family:'Space Mono',monospace;font-size:9px;color:#555;margin-top:4px;">+ ${parsed.length-4} more...</div>`:""}
    </div>`;
  } else if(text.trim()){
    btn.disabled=true;
    btn.style.cssText="width:100%;margin-top:14px;background:#1a1a2e;border:none;color:#333;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;padding:15px;cursor:default;";
    btn.textContent="LOAD SCHEDULE";
    preview.innerHTML=`<div style="font-family:'Space Mono',monospace;font-size:10px;color:#fc8181;margin-top:8px;">✗ Couldn't read format. Make sure each line has two times and a task name.</div>`;
  } else {
    preview.innerHTML="";
    btn.disabled=true;
  }
}

function loadPaste(){
  const text=document.getElementById("paste-input").value;
  const parsed=parseSchedule(text);
  if(parsed.length>0){
    saveEvents(parsed);
    closePaste();
    showToast(`✓ ${parsed.length} events loaded!`);
    render();
  }
}

function closePaste(){
  const m=document.getElementById("fc-paste-modal");
  if(m)m.remove();
}

// ─── ADD/EDIT MODAL ──────────────────────────────────────────────────────────
let editingId=null;

function openAdd(){
  editingId=null;
  const d=new Date();d.setMinutes(Math.ceil(d.getMinutes()/30)*30,0,0);
  const local=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  showAddModal("NEW BLOCK","",local,60);
}

function openEdit(id){
  const ev=events.find(e=>e.id===id);
  if(!ev)return;
  editingId=id;
  const d=evStart(ev);
  const local=new Date(d.getTime()-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
  showAddModal("EDIT BLOCK",ev.title,local,ev.durationMins);
}

function showAddModal(title,evTitle,datetime,dur){
  const existing=document.getElementById("fc-add-modal");
  if(existing)existing.remove();
  const modal=document.createElement("div");
  modal.id="fc-add-modal";
  modal.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,0.82);display:flex;align-items:center;justify-content:center;z-index:150;backdrop-filter:blur(6px);";
  modal.innerHTML=`
    <div onclick="event.stopPropagation()" style="background:#0f0f18;border:1px solid rgba(255,255,255,0.1);padding:26px;width:min(400px,90vw);border-radius:4px;">
      <div style="font-family:'Space Mono',monospace;font-size:12px;color:#00ff87;letter-spacing:3px;margin-bottom:18px;">${title}</div>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:#fff;letter-spacing:2px;margin-bottom:5px;">TITLE</div>
      <input id="add-title" type="text" value="${evTitle}" placeholder="What's the task?" autofocus style="display:block;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);color:#e2e8f0;font-family:'Barlow Condensed',sans-serif;font-size:18px;padding:10px 12px;outline:none;box-sizing:border-box;margin-bottom:12px;"/>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:#fff;letter-spacing:2px;margin-bottom:5px;">DATE & TIME</div>
      <input id="add-datetime" type="datetime-local" value="${datetime}" style="display:block;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);color:#e2e8f0;font-size:16px;padding:10px 12px;outline:none;box-sizing:border-box;margin-bottom:12px;"/>
      <div style="font-family:'Space Mono',monospace;font-size:9px;color:#fff;letter-spacing:2px;margin-bottom:5px;">DURATION (MIN)</div>
      <input id="add-dur" type="number" value="${dur}" min="1" max="480" step="5" style="display:block;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);color:#e2e8f0;font-size:16px;padding:10px 12px;outline:none;box-sizing:border-box;margin-bottom:20px;"/>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        ${editingId?`<button onclick="deleteEvent('${editingId}')" style="background:transparent;border:1px solid rgba(252,129,129,0.3);color:#fc8181;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:10px 14px;cursor:pointer;margin-right:auto;">DELETE</button>`:""}
        <button onclick="closeAdd()" style="background:transparent;border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;padding:10px 14px;cursor:pointer;">CANCEL</button>
        <button onclick="saveAdd()" style="background:#00ff87;border:none;color:#080810;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;padding:10px 18px;cursor:pointer;">SAVE</button>
      </div>
    </div>`;
  modal.onclick=closeAdd;
  document.body.appendChild(modal);
  document.getElementById("add-title").focus();
}

function saveAdd(){
  const title=document.getElementById("add-title").value.trim();
  const datetime=document.getElementById("add-datetime").value;
  const dur=parseInt(document.getElementById("add-dur").value);
  if(!title||!datetime)return;
  const dt=new Date(datetime).toISOString();
  if(editingId){
    saveEvents(events.map(e=>e.id===editingId?{...e,title,datetime:dt,durationMins:dur}:e));
  } else {
    saveEvents([...events,{id:Date.now().toString(),title,datetime:dt,durationMins:dur}]);
  }
  closeAdd();
  showToast("Saved!");
  render();
}

function deleteEvent(id){
  saveEvents(events.filter(e=>e.id!==id));
  closeAdd();
  showToast("Deleted");
  render();
}

function closeAdd(){
  const m=document.getElementById("fc-add-modal");
  if(m)m.remove();
}

// ─── TOGGLE ALL ──────────────────────────────────────────────────────────────
function toggleAll(btn){
  btn.dataset.open=btn.dataset.open==="1"?"0":"1";
  render();
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.createElement("div");
  t.style.cssText="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#00ff87;color:#080810;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:10px 20px;z-index:300;white-space:nowrap;border-radius:2px;";
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
setInterval(render,1000);
</script>
</body>
</html>
